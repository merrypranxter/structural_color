<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="WebGL laboratory for structural color, thin-film optics, and iridescence visualization" />
  <meta name="keywords" content="WebGL, Three.js, shaders, structural color, iridescence, optics" />
  <meta name="author" content="Structural Color Engine" />
  
  <title>Structural Color Engine | Spectral Interference Laboratory</title>
  
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050505;
      color: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 100;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #00ffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    #ui-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      pointer-events: none;
    }
    
    .shader-info {
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 8px;
      backdrop-filter: blur(10px);
      max-width: 300px;
    }
    
    .shader-info h1 {
      font-size: 18px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #ff00ff, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .shader-info p {
      font-size: 12px;
      color: #aaaaaa;
      line-height: 1.5;
    }
    
    #controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">
      <div class="spinner"></div>
      <p style="margin-top: 15px; color: #888;">Loading shaders...</p>
    </div>
    
    <div id="ui-overlay">
      <div class="shader-info">
        <h1>Thin-Film Interference</h1>
        <p>Simulating light interference in thin films. The colors change based on viewing angle and film thickness, mimicking soap bubbles and oil slicks.</p>
      </div>
    </div>
    
    <div id="controls"></div>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
