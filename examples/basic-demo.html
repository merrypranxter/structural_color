<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Structural Color Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    header {
      padding: 20px;
      background: linear-gradient(90deg, #1a1a2e, #16213e);
      border-bottom: 1px solid #333;
    }
    
    h1 {
      font-size: 24px;
      background: linear-gradient(90deg, #ff00ff, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    main {
      flex: 1;
      display: flex;
      padding: 20px;
      gap: 20px;
    }
    
    #canvas-container {
      flex: 1;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    
    #controls {
      width: 300px;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 20px;
    }
    
    .control-group {
      margin-bottom: 20px;
    }
    
    .control-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #aaa;
    }
    
    select, input[type="range"] {
      width: 100%;
      padding: 8px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #fff;
    }
    
    input[type="range"] {
      padding: 0;
    }
    
    .value-display {
      text-align: right;
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    
    .info {
      margin-top: 20px;
      padding: 15px;
      background: #2a2a2a;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.6;
      color: #bbb;
    }
    
    .info strong {
      color: #fff;
    }
    
    footer {
      padding: 15px 20px;
      text-align: center;
      font-size: 12px;
      color: #666;
      border-top: 1px solid #333;
    }
    
    @media (max-width: 768px) {
      main {
        flex-direction: column;
      }
      
      #controls {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Structural Color Engine - Demo</h1>
  </header>
  
  <main>
    <div id="canvas-container">
      <canvas id="glCanvas"></canvas>
    </div>
    
    <div id="controls">
      <div class="control-group">
        <label for="shader-select">Shader Effect</label>
        <select id="shader-select">
          <option value="thinFilm">Thin-Film Interference</option>
          <option value="morpho">Morpho Butterfly</option>
          <option value="scarab">Scarab Beetle</option>
          <option value="opal">Opal Photonic</option>
          <option value="birefringence">Birefringence</option>
        </select>
      </div>
      
      <div class="control-group">
        <label for="geometry-select">Geometry</label>
        <select id="geometry-select">
          <option value="sphere">Sphere</option>
          <option value="torus">Torus</option>
          <option value="torusKnot" selected>Torus Knot</option>
          <option value="icosahedron">Icosahedron</option>
        </select>
      </div>
      
      <div class="control-group">
        <label for="scale-slider">Pattern Scale</label>
        <input type="range" id="scale-slider" min="0.1" max="3" step="0.1" value="1">
        <div class="value-display" id="scale-value">1.0</div>
      </div>
      
      <div class="control-group">
        <label for="speed-slider">Animation Speed</label>
        <input type="range" id="speed-slider" min="0" max="2" step="0.1" value="0.5">
        <div class="value-display" id="speed-value">0.5</div>
      </div>
      
      <div class="info">
        <strong>Current Effect:</strong> <span id="effect-name">Thin-Film Interference</span><br><br>
        <span id="effect-description">
          Simulates the iridescent colors seen in soap bubbles and oil slicks. 
          The colors change based on viewing angle and film thickness.
        </span>
      </div>
    </div>
  </main>
  
  <footer>
    Structural Color Engine &copy; 2024 | Built with Three.js
  </footer>
  
  <script type="module">
    // This is a placeholder for the actual Three.js implementation
    // In the full version, this would load the shaders and create the WebGL scene
    
    const canvas = document.getElementById('glCanvas');
    const ctx = canvas.getContext('2d');
    
    function resize() {
      const container = document.getElementById('canvas-container');
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
    }
    
    resize();
    window.addEventListener('resize', resize);
    
    // Simple placeholder animation
    let time = 0;
    function animate() {
      time += 0.01;
      
      const w = canvas.width;
      const h = canvas.height;
      
      // Create gradient
      const gradient = ctx.createLinearGradient(0, 0, w, h);
      
      const hue1 = (time * 20) % 360;
      const hue2 = (time * 20 + 180) % 360;
      
      gradient.addColorStop(0, `hsl(${hue1}, 80%, 50%)`);
      gradient.addColorStop(0.5, `hsl(${(hue1 + hue2) / 2}, 80%, 50%)`);
      gradient.addColorStop(1, `hsl(${hue2}, 80%, 50%)`);
      
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, w, h);
      
      // Draw some circles to simulate the effect
      for (let i = 0; i < 5; i++) {
        const x = w / 2 + Math.sin(time + i) * 100;
        const y = h / 2 + Math.cos(time + i * 0.5) * 100;
        const r = 50 + Math.sin(time * 2 + i) * 20;
        
        const circleGrad = ctx.createRadialGradient(x, y, 0, x, y, r);
        circleGrad.addColorStop(0, `hsla(${(hue1 + i * 30) % 360}, 100%, 70%, 0.8)`);
        circleGrad.addColorStop(1, `hsla(${(hue2 + i * 30) % 360}, 100%, 50%, 0)`);
        
        ctx.fillStyle = circleGrad;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      
      requestAnimationFrame(animate);
    }
    
    animate();
    
    // UI controls
    const shaderSelect = document.getElementById('shader-select');
    const geometrySelect = document.getElementById('geometry-select');
    const scaleSlider = document.getElementById('scale-slider');
    const speedSlider = document.getElementById('speed-slider');
    const effectName = document.getElementById('effect-name');
    const effectDesc = document.getElementById('effect-description');
    
    const descriptions = {
      thinFilm: {
        name: 'Thin-Film Interference',
        desc: 'Simulates the iridescent colors seen in soap bubbles and oil slicks. The colors change based on viewing angle and film thickness.'
      },
      morpho: {
        name: 'Morpho Butterfly',
        desc: 'Diffraction grating simulation of Morpho butterfly wings. The microscopic ridges create intense blue iridescence.'
      },
      scarab: {
        name: 'Scarab Beetle',
        desc: 'Multi-layer Bragg reflection from beetle shells. Creates metallic color-shifting effects.'
      },
      opal: {
        name: 'Opal Photonic Crystal',
        desc: '3D photonic crystal interference. Simulates the play-of-color in precious opals.'
      },
      birefringence: {
        name: 'Birefringence',
        desc: 'Photoelastic stress field visualization. Shows stress patterns in transparent materials under polarized light.'
      }
    };
    
    shaderSelect.addEventListener('change', (e) => {
      const info = descriptions[e.target.value];
      effectName.textContent = info.name;
      effectDesc.textContent = info.desc;
    });
    
    scaleSlider.addEventListener('input', (e) => {
      document.getElementById('scale-value').textContent = e.target.value;
    });
    
    speedSlider.addEventListener('input', (e) => {
      document.getElementById('speed-value').textContent = e.target.value;
    });
  </script>
</body>
</html>
